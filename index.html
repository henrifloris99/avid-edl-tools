<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Avid EDL Tools</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Avid EDL Tools</h1>


<p>Select EDL Type:</p>

<div id="edlTypeSelector">

    <label>
        <input 
            type="radio" 
            name="edlType" 
            value="slug"
            checked
        >
        Slug EDL
    </label>

    <br>

    <label>
        <input 
            type="radio" 
            name="edlType" 
            value="archive"
        >
        Archive EDL
    </label>

</div>


<br>


<p>Drop an Avid EDL anywhere on this page.</p>

<div id="dropZone">

Drop EDL Here

</div>


<div id="fieldSelector" style="display:none;">

<h3>Excel Export Fields</h3>

<label>
<input type="checkbox" value="eventNumber" checked>
Event Number
</label>

<br>

<label>
<input type="checkbox" value="sourceIn" checked>
Source In
</label>

<br>

<label>
<input type="checkbox" value="sourceOut" checked>
Source Out
</label>

<br>

<label>
<input type="checkbox" value="recordIn" checked>
Record In
</label>

<br>

<label>
<input type="checkbox" value="recordOut" checked>
Record Out
</label>

<br>

<label>
<input type="checkbox" value="duration" checked>
Duration
</label>

<br>

<label>
<input type="checkbox" value="slug" checked>
Slug
</label>

</div>


<button id="exportButton" style="display:none;">
Export Excel
</button>


<div id="results"></div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="parser.js"></script>
<script src="excel.js"></script>
<script src="script.js"></script>


</body>

</html>
